<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Party</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <div class = "menu">
      <h1 class="title">Join {{ party["host_name"] }}'s party</h1>
      <form method="POST" class="main_menu_inner">
        <div class="row">
          <label class="text" for="name">Your name:</label>
          <input autocomplete="off" type="text" id="name" name="guest_name" class="underline_input long_width" required>
        </div>
        <label class="text">
            Favorite team: 
            <select name="favorite_team" class="team" required>
            <option value="">Choose a team</option>
              {% for team in teams %}
                <option value="{{team}}">{{team}}</option>
              {% endfor %}
            </select>
        </label>

        <h2 class="title">Which matches can you attend?</h2>
        <div class="match_list">
          {% for match in matches %}
            <label class="match_option">
              <input
                type="checkbox"
                name="available_matches"
                value="{{ match['id'] }}"
              >

              <span class="match_details">
                <span class="match_teams">
                  {{ match["team1"] }} vs {{ match["team2"] }}
                </span>
                <span class="match_time">
                  {{ match["date"] }} @ {{ match["time"] }}
                </span>
              </span>
            </label>
          {% endfor %}
        </div>
        <br>

        <button type="submit" class="submit">Join party</button>
      </form>
    </div>
  </main>
</body>
</html>
