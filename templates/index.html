<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC party automator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<main>
  <div class="main_menu">
    <h2 class="title">Create A Party</h2>
    <div class="row">
      <label class="text" for="name">Party Name:</label>
      <input type="text" id="name" name="name" class="underline_input long_width">
    </div>
    <div class="row">
      <label class="text" for="team">Favorite Team:</label>
      <select name="team" id="team" class="team">
    </select>
    </div>
    <div class="row">
      <label class="text" for="guests">Number of Guests:</label>
      <input type="number" id="guests" name="guests" class="underline_input small_width">
    </div>                                           
    <div class="row">
      <label class="text" for="budget">Budget:</label>
      <label class="text dollar_sign" for="budget">$</label>
      <input type="number" class="underline_input small_width" id="budget" name="budget">
    </div>
    <div class="row">
      <label class="text" for="date">Available Dates:</label>
      <input type="date" id="date" name="date">
    </div>
    <div></div> 
    <div></div>
    <button id="submit" class="submit" onClick="submit()">Create</button>
  </div>
</main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
