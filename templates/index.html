<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>World Cup Party Automator</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <h1>World Cup Party Automator</h1>
        <a href="{{ url_for('create_party') }}">
            Create a new party!
        </a>

        <h2>Already have a party code?</h2>
        <form action="{{ url_for('find_party') }}" method="POST">
            <label for="party-code">Enter Party Code:</label>
            <input type="text" id="party-code" name="party_code" required>
            <button type="submit">Join Party</button>
        </form>
